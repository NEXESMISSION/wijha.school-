<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WIJHA — Aide-nous à créer ta formation idéale</title>
  <meta name="description" content="90 secondes, que des boutons. Tu reçois la date de la prochaine session en avant-première." />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <meta name="robots" content="noindex" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="WIJHA Academy" />
  <meta property="og:title" content="Aide-nous à créer ta formation idéale — WIJHA" />
  <meta property="og:image" content="img/og-cover.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Cairo:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="course.css" />
  <style>
    body { background: var(--paper); }
    .sv-wrap { max-width: 600px; margin: 0 auto; padding: clamp(20px, 4vh, 44px) 20px 80px; }
    [dir=rtl] .sv-wrap, [dir=rtl] .sv-q label, [dir=rtl] .sv-q .sv-label { font-family: "Cairo", var(--sans); }
    [dir=rtl] .sv-q { text-align: right; }
    [dir=rtl] .sv-opt { text-align: right; }

    /* sélecteur de langue */
    .sv-lang { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
    .sv-lang button { display: inline-flex; align-items: center; gap: 7px; font-family: var(--sans); font-size: 13.5px;
      font-weight: 700; color: var(--ink-2); background: var(--card); border: 1px solid var(--line);
      border-radius: 999px; padding: 7px 14px; cursor: pointer; transition: .15s; }
    .sv-lang button.on { background: var(--pop); border-color: var(--pop); color: #fff; }
    .sv-lang .flag { width: 20px; height: 14px; border-radius: 2px; flex: none; box-shadow: 0 0 0 1px rgba(0,0,0,.06); }

    .sv-head { text-align: center; margin-bottom: 20px; }
    .sv-head img.logo { width: 50px; height: 50px; border-radius: 14px; }
    .sv-head h1 { font-family: var(--serif); font-weight: 800; font-size: clamp(25px, 5vw, 34px);
      letter-spacing: -0.03em; line-height: 1.15; margin: 14px 0 0; }
    [dir=rtl] .sv-head h1 { font-family: "Cairo", var(--serif); letter-spacing: 0; }
    .sv-head p { color: var(--ink-2); font-size: 15.5px; margin: 12px auto 0; max-width: 46ch; line-height: 1.6; }
    [dir=rtl] .sv-head p { font-family: "Cairo", var(--sans); }
    .sv-head .sv-mins { display: inline-block; margin-top: 14px; font-family: var(--mono); font-size: 11.5px;
      font-weight: 700; letter-spacing: .06em; color: var(--pop); background: var(--pop-soft); border-radius: 999px; padding: 6px 14px; }

    .sv-prog { position: sticky; top: 0; z-index: 10; height: 6px; background: var(--paper-2); border-radius: 999px; overflow: hidden; margin: 0 0 22px; }
    .sv-prog__bar { height: 100%; width: 0; border-radius: 999px; background: linear-gradient(90deg, var(--pop), oklch(0.62 0.2 290)); transition: width .35s var(--ease, ease); }

    .sv-card { background: var(--card); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); padding: clamp(20px, 4vw, 32px); }
    .sv-q { padding: 18px 0; border-top: 1px solid var(--line); }
    .sv-q:first-child { padding-top: 4px; border-top: 0; }
    .sv-q > label, .sv-q > .sv-label { display: block; font-family: var(--serif); font-weight: 700; font-size: 16px; color: var(--ink); margin-bottom: 11px; letter-spacing: -0.01em; line-height: 1.4; }
    .sv-q .req { color: var(--save, #e11d48); font-weight: 700; }
    .sv-q .opt { font-family: var(--sans); font-weight: 500; font-size: 12.5px; color: var(--ink-3); }
    .sv-q input[type=text], .sv-q input[type=tel], .sv-q select {
      width: 100%; border: 1px solid var(--line); background: var(--paper); border-radius: 12px; padding: 13px 15px;
      font-size: 15.5px; font-family: inherit; color: var(--ink); outline: none; transition: border-color .15s; }
    .sv-q input:focus, .sv-q select:focus { border-color: var(--pop); }
    .sv-hint { display: block; margin-top: 8px; font-size: 12.5px; color: var(--ink-3); line-height: 1.5; }
    .sv-opts { display: flex; flex-wrap: wrap; gap: 8px; }
    .sv-opt { font-family: inherit; font-size: 14px; font-weight: 600; color: var(--ink-2); background: var(--paper);
      border: 1px solid var(--line); border-radius: 999px; padding: 10px 15px; cursor: pointer; transition: .15s; }
    .sv-opt:hover { border-color: var(--pop); color: var(--pop); }
    .sv-opt.on { background: var(--pop); border-color: var(--pop); color: #fff; }
    .sv-other { margin-top: 8px; display: none; } .sv-other.on { display: block; }
    .sv-submit { width: 100%; justify-content: center; padding: 15px; font-size: 16px; border-radius: 13px; margin-top: 20px; }
    .sv-foot { text-align: center; margin-top: 14px; font-size: 12px; color: var(--ink-3); }
    .hp { position: absolute; left: -9999px; opacity: 0; height: 0; overflow: hidden; }
    .sv-err { display: none; margin-top: 12px; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 14px; border-radius: 11px; padding: 11px 14px; text-align: center; }
    .sv-err.on { display: block; }
    .sv-done { display: none; text-align: center; padding: 36px 14px; background: var(--card); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); }
    .sv-done.on { display: block; }
    .sv-done .sv-check { width: 66px; height: 66px; border-radius: 50%; display: grid; place-items: center; margin: 0 auto 18px; background: color-mix(in oklab, #16a34a 12%, var(--card)); color: #16a34a; }
    .sv-done h2 { font-family: var(--serif); font-weight: 800; font-size: 27px; margin: 0 0 10px; }
    [dir=rtl] .sv-done h2, [dir=rtl] .sv-done p { font-family: "Cairo", var(--sans); }
    .sv-done p { color: var(--ink-2); font-size: 16px; margin: 0 auto; max-width: 40ch; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="sv-wrap">
    <div class="sv-lang" id="svLang">
      <button type="button" data-lang="fr" class="on">
        <svg class="flag" viewBox="0 0 60 40"><rect width="60" height="40" fill="#fff"/><rect width="20" height="40" fill="#0055A4"/><rect x="40" width="20" height="40" fill="#EF4135"/></svg> Français
      </button>
      <button type="button" data-lang="ar">
        <svg class="flag" viewBox="0 0 60 40"><rect width="60" height="40" fill="#E70013"/><circle cx="30" cy="20" r="11" fill="#fff"/><circle cx="31.4" cy="20" r="8" fill="#E70013"/><circle cx="34.2" cy="20" r="8" fill="#fff"/><path d="M35.5 16.6 36.32 18.87 38.73 18.95 36.83 20.43 37.5 22.75 35.5 21.4 33.5 22.75 34.17 20.43 32.27 18.95 34.68 18.87Z" fill="#E70013"/></svg> العربية
      </button>
    </div>

    <div class="sv-head">
      <img class="logo" src="logo.png" alt="WIJHA" />
      <h1 id="svTitle"></h1>
      <p id="svSub"></p>
      <span class="sv-mins" id="svBadge"></span>
    </div>

    <div class="sv-prog" aria-hidden="true"><div class="sv-prog__bar" id="svProg"></div></div>
    <form class="sv-card" id="surveyForm" novalidate></form>

    <div class="sv-done" id="svDone">
      <div class="sv-check"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M5 12.5 10 17.5 19.5 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h2 id="svDoneH"></h2><p id="svDoneP"></p>
    </div>
  </div>

  <script>
  (function () {
    var GOUV = ["Tunis","Ariana","Ben Arous","Manouba","Nabeul","Zaghouan","Bizerte","Béja","Jendouba","Le Kef","Siliana","Sousse","Monastir","Mahdia","Sfax","Kairouan","Kasserine","Sidi Bouzid","Gabès","Médenine","Tataouine","Gafsa","Tozeur","Kébili","Hors Tunisie"];
    // textes d'interface
    var T = {
      fr: { title:"Aide-nous à créer ta formation idéale 🚀", sub:"Moins de 2 minutes, juste des boutons à taper. En échange, tu reçois la date de la prochaine session en avant-première.", badge:"⏱️ ~90 secondes · que des clics", submit:"Envoyer mes réponses →", sending:"Envoi…", optional:"(optionnel)", other:"Précise…", foot:"🔒 On ne partage jamais tes infos. Tes réponses servent juste à améliorer WIJHA.", doneH:"Merci ! 🎉", doneP:"On a bien reçu tes réponses — elles nous aident à créer la formation qui te ressemble. On te prévient dès la prochaine session live. À très vite 👋", eTel:"Ajoute ton numéro WhatsApp 📱", eForm:"Choisis la formation qui t'attire le plus.", eInt:"Dis-nous où tu en es 🙂", eBud:"Indique ton budget — ça nous aide vraiment.", eNet:"Oups, l'envoi a échoué. Réessaie dans un instant 🙏" },
      ar: { title:"ساعدنا في إنشاء التكوين المثالي لك 🚀", sub:"أقل من دقيقتين، مجرّد أزرار للنقر عليها. وفي المقابل، تحصل على موعد الحصة القادمة قبل الجميع.", badge:"⏱️ ~90 ثانية · مجرّد نقرات", submit:"إرسال إجاباتي →", sending:"جارٍ الإرسال…", optional:"(اختياري)", other:"حدّد…", foot:"🔒 لن نشارك معلوماتك أبدًا. إجاباتك تساعدنا فقط على تحسين WIJHA.", doneH:"شكرًا لك ! 🎉", doneP:"لقد استلمنا إجاباتك — إنها تساعدنا على إنشاء التكوين الذي يناسبك. سنُعلمك بموعد الحصة المباشرة القادمة. إلى اللقاء قريبًا 👋", eTel:"أضف رقم هاتفك (واتساب) 📱", eForm:"اختر التكوين الذي يجذبك أكثر.", eInt:"أخبرنا أين أنت الآن 🙂", eBud:"حدّد ميزانيتك — هذا يساعدنا كثيرًا.", eNet:"عذرًا، فشل الإرسال. حاول مرة أخرى بعد قليل 🙏" }
    };
    // o(valeur_canonique, fr, ar) — la VALEUR canonique est ce qui est stocké (data propre quelle que soit la langue)
    var o = function (v, fr, ar) { return { v: v, fr: fr, ar: ar }; };
    var FIELDS = [
      { id:"tel", type:"tel", req:true, L:{fr:"📱 Ton numéro WhatsApp", ar:"📱 رقم هاتفك (واتساب)"}, H:{fr:"Pour qu'on t'envoie la date de la prochaine session live (et rien d'autre). 🔒 On ne partage jamais ton numéro.", ar:"لكي نرسل لك موعد الحصة المباشرة القادمة (لا غير). 🔒 لن نشارك رقمك أبدًا."}, P:{fr:"+216 ...", ar:"+216 ..."} },
      { id:"prenom", type:"text", req:false, L:{fr:"Ton prénom", ar:"اسمك"}, H:{fr:"Pour qu'on t'écrive correctement 🙂", ar:"لكي نخاطبك باسمك 🙂"}, P:{fr:"Ton prénom", ar:"اسمك"} },
      { id:"formation_cible", type:"pills", req:true, L:{fr:"Quelle formation t'attire le plus ?", ar:"أي تكوين يجذبك أكثر ؟"}, O:[
        o("Site Web","Site Web — créer un site en live, sans coder","موقع ويب — أنشئ موقعًا مباشرةً، دون برمجة"),
        o("Web Apps","Web Apps — une vraie appli (base de données, comptes, paiement)","تطبيق ويب — تطبيق حقيقي (قاعدة بيانات، حسابات، دفع)"),
        o("Les deux","Les deux m'intéressent","كلاهما يهمّني"),
        o("Pas sûr","Je ne sais pas encore, aide-moi à choisir","لا أعرف بعد، ساعدني على الاختيار") ] },
      { id:"intention", type:"pills", req:true, L:{fr:"Tu en es où, là, maintenant ?", ar:"أين أنت الآن بالضبط ؟"}, H:{fr:"Sois honnête, ça nous aide à t'aider — pas de mauvaise réponse.", ar:"كن صريحًا، هذا يساعدنا على مساعدتك — لا توجد إجابة خاطئة."}, O:[
        o("Chaud 🔥","Je veux m'inscrire, je suis chaud(e) 🔥","أريد التسجيل، أنا متحمّس 🔥"),
        o("Très intéressé","Très intéressé(e), j'ai juste 1-2 questions","مهتمّ جدًا، لديّ سؤال أو سؤالان فقط"),
        o("Plus tard","Ça m'intéresse, mais pas tout de suite","يهمّني، لكن ليس الآن"),
        o("Découvre","Je regarde juste / je découvre","أتصفّح فقط / أكتشف") ] },
      { id:"objectif", type:"pills", req:false, other:true, L:{fr:"Ton objectif principal avec WIJHA ?", ar:"ما هدفك الأساسي مع WIJHA ؟"}, O:[
        o("Business/projet","Créer un site/appli pour mon business ou projet","إنشاء موقع/تطبيق لمشروعي أو عملي"),
        o("Freelance","Gagner de l'argent en freelance (clients TN ou étranger)","كسب المال كمستقلّ (عملاء محليون أو من الخارج)"),
        o("Emploi","Décrocher un emploi / changer de métier","الحصول على عمل / تغيير المهنة"),
        o("Startup","Lancer ma propre startup / app","إطلاق شركتي الناشئة / تطبيقي"),
        o("Compétences","Monter en compétences pour mon travail","تطوير مهاراتي من أجل عملي"),
        o("Curiosité","Apprendre par curiosité / projet perso","التعلّم بدافع الفضول / مشروع شخصي") ] },
      { id:"budget", type:"pills", req:true, L:{fr:"Pour une formation LIVE qui te fait sortir un vrai projet, tu mettrais combien ?", ar:"لتكوين مباشر يخرّجك بمشروع حقيقي، كم تدفع ؟"}, H:{fr:"💳 Pas besoin de carte bancaire — D17, Flouci ou poste, on te guide.", ar:"💳 لا حاجة لبطاقة بنكية — D17 أو Flouci أو البريد، سنرشدك."}, O:[
        o("Gratuit","Gratuit seulement","مجانًا فقط"),
        o("<50 DT","Moins de 50 DT","أقل من 50 دينار"),
        o("50-100 DT","50 – 100 DT","50 – 100 دينار"),
        o("100-200 DT","100 – 200 DT","100 – 200 دينار"),
        o("200-400 DT","200 – 400 DT","200 – 400 دينار"),
        o("400+ DT","Plus de 400 DT si ça vaut le coup","أكثر من 400 دينار إذا كان يستحقّ") ] },
      { id:"blocage", type:"pills", req:false, L:{fr:"Qu'est-ce qui pourrait t'empêcher de t'inscrire ?", ar:"ما الذي قد يمنعك من التسجيل ؟"}, H:{fr:"Dis-nous franchement — c'est pour lever le frein, pas pour te vendre.", ar:"أخبرنا بصراحة — لرفع العائق، لا لبيعك شيئًا."}, O:[
        o("Prix","Le prix / mon budget","السعر / ميزانيتي"),
        o("Temps","Le manque de temps","ضيق الوقت"),
        o("Niveau","Peur de ne pas suivre / niveau trop dur","الخوف من عدم المتابعة / المستوى صعب"),
        o("Résultat ?","Pas sûr(e) que ça donne un résultat concret","لست متأكّدًا أنه يعطي نتيجة ملموسة"),
        o("Paiement","Comment payer en ligne (j'ai pas de carte)","كيفية الدفع عبر الإنترنت (ليس لديّ بطاقة)"),
        o("Préfère vidéo","Je préfère les vidéos enregistrées au live","أفضّل الفيديوهات المسجّلة على المباشر"),
        o("Rien (prêt 🔥)","Rien, je suis prêt(e) à m'inscrire 🔥","لا شيء، أنا مستعدّ للتسجيل 🔥") ] },
      { id:"equipement", type:"pills", req:false, L:{fr:"Pour suivre la formation, tu as…", ar:"لمتابعة التكوين، لديك…"}, O:[
        o("PC","Un PC / laptop","حاسوب / لابتوب"),
        o("Smartphone","Seulement un smartphone","هاتف ذكي فقط"),
        o("PC moyen","Un PC mais pas terrible / partagé","حاسوب لكنه ليس جيدًا / مشترك"),
        o("Emprunt/cyber","Je peux en emprunter / aller au cyber","يمكنني استعارته / الذهاب إلى مقهى إنترنت") ] },
      { id:"dispo", type:"pills", req:false, L:{fr:"Quand serais-tu le plus dispo pour une session live ?", ar:"متى تكون متاحًا أكثر لحصة مباشرة ؟"}, O:[
        o("Soir semaine","Soirées en semaine (après 18h)","مساءً في أيام الأسبوع (بعد 18س)"),
        o("Journée semaine","En journée en semaine","نهارًا في أيام الأسبوع"),
        o("Week-end","Le week-end","في عطلة نهاية الأسبوع"),
        o("Vacances","Pendant les vacances","أثناء العطل"),
        o("Flexible","Flexible / peu importe","مرن / لا يهمّ") ] },
      { id:"source", type:"pills", req:false, other:true, L:{fr:"Comment tu as connu WIJHA ?", ar:"كيف تعرّفت على WIJHA ؟"}, O:[
        o("Instagram","Instagram","Instagram"), o("TikTok","TikTok","TikTok"),
        o("Facebook","Facebook (page/pub)","Facebook (صفحة/إعلان)"), o("Groupe FB","Un groupe Facebook","مجموعة على Facebook"),
        o("Ami","Un(e) ami(e)","صديق / أخبرني أحدهم"), o("Google","Google","Google") ] },
      { id:"gouvernorat", type:"select", req:false, L:{fr:"Tu es dans quel gouvernorat ?", ar:"في أي ولاية تقيم ؟"}, H:{fr:"Pour savoir d'où vient notre communauté 🇹🇳", ar:"لكي نعرف من أين يأتي مجتمعنا 🇹🇳"} },
    ];

    var form = document.getElementById("surveyForm");
    var lang = (function () { try { return localStorage.getItem("wijha_survey_lang") === "ar" ? "ar" : "fr"; } catch (e) { return "fr"; } })();
    var values = {}; // id -> canonical value
    var esc = function (s) { return String(s).replace(/[<>&"]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]; }); };

    function build() {
      var t = T[lang];
      document.documentElement.setAttribute("lang", lang === "ar" ? "ar" : "fr");
      document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
      document.getElementById("svTitle").textContent = t.title;
      document.getElementById("svSub").textContent = t.sub;
      document.getElementById("svBadge").textContent = t.badge;
      document.getElementById("svDoneH").textContent = t.doneH;
      document.getElementById("svDoneP").textContent = t.doneP;
      document.querySelectorAll(".sv-lang button").forEach(function (b) { b.classList.toggle("on", b.getAttribute("data-lang") === lang); });

      form.innerHTML = "";
      FIELDS.forEach(function (f) {
        var q = document.createElement("div"); q.className = "sv-q";
        var tag = f.req ? '<span class="req"> *</span>' : '<span class="opt"> ' + t.optional + '</span>';
        var label = f.L[lang];
        if (f.type === "tel" || f.type === "text") {
          q.innerHTML = '<label for="f-' + f.id + '">' + label + tag + '</label>' +
            '<input id="f-' + f.id + '" name="' + f.id + '" type="' + f.type + '"' + (f.type === "tel" ? ' inputmode="tel"' : '') +
            ' placeholder="' + esc(f.P[lang]) + '" value="' + esc(values[f.id] || "") + '" />' +
            (f.H ? '<span class="sv-hint">' + f.H[lang] + '</span>' : '');
        } else if (f.type === "select") {
          var opts = GOUV.map(function (g) { return '<option value="' + esc(g) + '"' + ((values[f.id] || "Tunis") === g ? ' selected' : '') + '>' + esc(g) + '</option>'; }).join("");
          if (!values[f.id]) values[f.id] = "Tunis";
          q.innerHTML = '<label for="f-' + f.id + '">' + label + tag + '</label><select id="f-' + f.id + '" name="' + f.id + '">' + opts + '</select>' + (f.H ? '<span class="sv-hint">' + f.H[lang] + '</span>' : '');
        } else { // pills
          var pills = f.O.map(function (op) { return '<button type="button" class="sv-opt' + (values[f.id] === op.v ? " on" : "") + '" data-v="' + esc(op.v) + '">' + esc(op[lang]) + '</button>'; }).join("");
          q.innerHTML = '<span class="sv-label">' + label + tag + '</span>' + (f.H ? '<span class="sv-hint" style="margin:-4px 0 11px">' + f.H[lang] + '</span>' : '') +
            '<div class="sv-opts" data-field="' + f.id + '">' + pills + '</div>' +
            (f.other ? '<input class="sv-other' + (/Autre|أخرى/.test(values[f.id] || "") ? " on" : "") + '" name="' + f.id + '_autre" type="text" placeholder="' + esc(t.other) + '" value="' + esc(values[f.id + "_autre"] || "") + '" />' : '');
        }
        form.appendChild(q);
      });
      var tail = document.createElement("div");
      tail.innerHTML = '<div class="hp" aria-hidden="true"><label>x<input name="company" type="text" tabindex="-1" autocomplete="off" /></label></div>' +
        '<button type="submit" class="btn btn--pop sv-submit" id="svBtn">' + t.submit + '</button>' +
        '<div class="sv-err" id="svErr"></div><p class="sv-foot">' + t.foot + '</p>';
      form.appendChild(tail);
      wire(); updateProgress();
    }

    function updateProgress() {
      var done = 0; FIELDS.forEach(function (f) { if (values[f.id] && String(values[f.id]).trim()) done++; });
      document.getElementById("svProg").style.width = Math.round(done / FIELDS.length * 100) + "%";
    }
    function wire() {
      form.querySelectorAll(".sv-opts").forEach(function (grp) {
        var field = grp.getAttribute("data-field");
        grp.addEventListener("click", function (e) {
          var b = e.target.closest(".sv-opt"); if (!b) return;
          grp.querySelectorAll(".sv-opt").forEach(function (x) { x.classList.remove("on"); });
          b.classList.add("on");
          values[field] = b.getAttribute("data-v");
          var other = form.querySelector('input[name="' + field + '_autre"]');
          if (other) other.classList.toggle("on", /Autre|أخرى/i.test(values[field]) || values[field] === "Autre");
          updateProgress();
        });
      });
      form.querySelectorAll('input[type=text],input[type=tel],select').forEach(function (el) {
        el.addEventListener("input", function () { values[el.name] = el.value; updateProgress(); });
        el.addEventListener("change", function () { values[el.name] = el.value; updateProgress(); });
      });
    }

    // langue
    document.getElementById("svLang").addEventListener("click", function (e) {
      var b = e.target.closest("button"); if (!b) return;
      lang = b.getAttribute("data-lang");
      try { localStorage.setItem("wijha_survey_lang", lang); } catch (e2) {}
      build();
    });

    // submit
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var t = T[lang], err = document.getElementById("svErr");
      function fail(m) { err.textContent = m; err.classList.add("on"); err.scrollIntoView({ block: "center", behavior: "smooth" }); }
      err.classList.remove("on");
      // recolle les valeurs des champs texte/select courants
      form.querySelectorAll('input[type=text],input[type=tel],select').forEach(function (el) { values[el.name] = el.value.trim(); });
      if (!values.tel) return fail(t.eTel);
      if (!values.formation_cible) return fail(t.eForm);
      if (!values.intention) return fail(t.eInt);
      if (!values.budget) return fail(t.eBud);
      var data = { langue: lang, page: location.pathname, company: (form.querySelector('[name=company]') || {}).value || "" };
      FIELDS.forEach(function (f) { data[f.id] = values[f.id] || ""; if (f.other) data[f.id + "_autre"] = values[f.id + "_autre"] || ""; });
      var btn = document.getElementById("svBtn"); btn.disabled = true; btn.textContent = t.sending; btn.style.opacity = ".7";
      fetch("/api/survey", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) })
        .then(function (r) { if (!r.ok) throw new Error("http " + r.status);
          form.style.display = "none"; document.querySelector(".sv-prog").style.display = "none"; document.querySelector(".sv-lang").style.display = "none";
          document.getElementById("svDone").classList.add("on"); window.scrollTo({ top: 0, behavior: "smooth" }); })
        .catch(function () { btn.disabled = false; btn.textContent = t.submit; btn.style.opacity = ""; fail(t.eNet); });
    });

    build();
  })();
  </script>
</body>
</html>
