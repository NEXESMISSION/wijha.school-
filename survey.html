  <style>
    body { background: var(--paper); }
    .sv-wrap { max-width: 600px; margin: 0 auto; padding: clamp(20px, 4vh, 44px) 20px 80px; }
    [dir=rtl] .sv-wrap, [dir=rtl] .sv-q label, [dir=rtl] .sv-q .sv-label { font-family: "Cairo", var(--sans); }
    [dir=rtl] .sv-q { text-align: right; }
    [dir=rtl] .sv-opt { text-align: right; }

    /* barre du haut : logo + sélecteur de langue, centrés côte à côte */
    .sv-top { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 22px; }
    .sv-logo { width: 52px; height: 52px; border-radius: 14px; flex: none; box-shadow: 0 6px 16px -8px rgba(0,0,0,.35); }

    /* dropdown langue (custom) */
    .sv-lang { position: relative; }
    .sv-lang__btn { display: inline-flex; align-items: center; gap: 9px; font-family: var(--sans); font-size: 14px;
      font-weight: 700; color: var(--ink); background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; padding: 9px 12px; cursor: pointer; transition: .15s; }
    .sv-lang__btn:hover { border-color: var(--pop); }
    .sv-lang.open .sv-lang__btn { border-color: var(--pop); box-shadow: 0 0 0 3px var(--pop-soft); }
    .sv-lang__cur { display: inline-flex; align-items: center; gap: 8px; }
    .sv-lang .flag { width: 22px; height: 15px; border-radius: 3px; flex: none; box-shadow: 0 0 0 1px rgba(0,0,0,.08); }
    .sv-lang__chev { width: 15px; height: 15px; color: var(--ink-3); transition: transform .2s; flex: none; }
    .sv-lang.open .sv-lang__chev { transform: rotate(180deg); }
    .sv-lang__menu { position: absolute; top: calc(100% + 7px); left: 0; right: auto; min-width: 172px; background: var(--card);
      border: 1px solid var(--line); border-radius: 13px; box-shadow: 0 18px 44px -14px rgba(0,0,0,.32); padding: 5px;
      z-index: 40; opacity: 0; visibility: hidden; transform: translateY(-6px); transition: opacity .16s, transform .16s, visibility .16s; }
    .sv-lang.open .sv-lang__menu { opacity: 1; visibility: visible; transform: none; }
    [dir=rtl] .sv-lang__menu { left: auto; right: 0; }
    .sv-lang__opt { display: flex; align-items: center; gap: 10px; width: 100%; font-family: var(--sans); font-size: 14px;
      font-weight: 600; color: var(--ink-2); background: transparent; border: 0; border-radius: 9px; padding: 10px 11px;
      cursor: pointer; transition: .12s; text-align: left; }
    .sv-lang__opt:hover { background: var(--paper-2); color: var(--ink); }
    .sv-lang__opt.on { color: var(--pop); font-weight: 700; }
    .sv-lang__opt .check { margin-inline-start: auto; width: 15px; height: 15px; opacity: 0; color: var(--pop); }
    .sv-lang__opt.on .check { opacity: 1; }
    [dir=rtl] .sv-lang__opt { text-align: right; }

    .sv-head { text-align: center; margin-bottom: 20px; }
    .sv-head h1 { font-family: var(--serif); font-weight: 800; font-size: clamp(25px, 5vw, 34px);
      letter-spacing: -0.03em; line-height: 1.15; margin: 0; }
    [dir=rtl] .sv-head h1 { font-family: "Cairo", var(--serif); letter-spacing: 0; }
    .sv-head p { color: var(--ink-2); font-size: 15.5px; margin: 12px auto 0; max-width: 46ch; line-height: 1.6; }
    [dir=rtl] .sv-head p { font-family: "Cairo", var(--sans); }
    .sv-head .sv-mins { display: inline-block; margin-top: 14px; font-family: var(--mono); font-size: 11.5px;
      font-weight: 700; letter-spacing: .06em; color: var(--pop); background: var(--pop-soft); border-radius: 999px; padding: 6px 14px; }

    .sv-prog { position: sticky; top: 0; z-index: 10; height: 6px; background: var(--paper-2); border-radius: 999px; overflow: hidden; margin: 0 0 22px; }
    .sv-prog__bar { height: 100%; width: 0; border-radius: 999px; background: linear-gradient(90deg, var(--pop), oklch(0.62 0.2 290)); transition: width .35s var(--ease, ease); }

    .sv-card { background: var(--card); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); padding: clamp(20px, 4vw, 32px); }
    .sv-q { padding: 18px 0; border-top: 1px solid var(--line); }
    .sv-q:first-child { padding-top: 4px; border-top: 0; }
    .sv-q > label, .sv-q > .sv-label { display: block; font-family: var(--serif); font-weight: 700; font-size: 16px; color: var(--ink); margin-bottom: 11px; letter-spacing: -0.01em; line-height: 1.4; }
    .sv-q .req { color: var(--save, #e11d48); font-weight: 700; }
    .sv-q .opt { font-family: var(--sans); font-weight: 500; font-size: 12.5px; color: var(--ink-3); }
    .sv-q input[type=text], .sv-q input[type=tel], .sv-q select {
      width: 100%; border: 1px solid var(--line); background: var(--paper); border-radius: 12px; padding: 13px 15px;
      font-size: 15.5px; font-family: inherit; color: var(--ink); outline: none; transition: border-color .15s; }
    .sv-q input:focus, .sv-q select:focus { border-color: var(--pop); }
    .sv-hint { display: block; margin-top: 8px; font-size: 12.5px; color: var(--ink-3); line-height: 1.5; }
    .sv-opts { display: flex; flex-wrap: wrap; gap: 8px; }
    .sv-opt { font-family: inherit; font-size: 14px; font-weight: 600; color: var(--ink-2); background: var(--paper);
      border: 1px solid var(--line); border-radius: 999px; padding: 10px 15px; cursor: pointer; transition: .15s; }
    .sv-opt:hover { border-color: var(--pop); color: var(--pop); }
    .sv-opt.on { background: var(--pop); border-color: var(--pop); color: #fff; }
    .sv-other { margin-top: 8px; display: none; } .sv-other.on { display: block; }
    .sv-submit { width: 100%; justify-content: center; padding: 15px; font-size: 16px; border-radius: 13px; margin-top: 20px; }
    .sv-foot { text-align: center; margin-top: 14px; font-size: 12px; color: var(--ink-3); }
    .hp { position: absolute; left: -9999px; opacity: 0; height: 0; overflow: hidden; }

    /* champ requis manquant : surlignage rouge + petit message */
    .sv-q.err > label, .sv-q.err > .sv-label { color: #e11d48; }
    .sv-q.err input[type=tel], .sv-q.err input[type=text], .sv-q.err select { border-color: #e11d48; box-shadow: 0 0 0 3px rgba(225,29,72,.13); }
    .sv-q.err .sv-opts { outline: 2px solid rgba(225,29,72,.4); outline-offset: 5px; border-radius: 14px; }
    .sv-qerr { display: block; margin-top: 10px; font-size: 12.5px; font-weight: 700; color: #e11d48; }
    .sv-q.err { animation: svShake .42s cubic-bezier(.36,.07,.19,.97); }
    @keyframes svShake { 0%,100%{transform:translateX(0)} 18%{transform:translateX(-6px)} 38%{transform:translateX(6px)} 58%{transform:translateX(-4px)} 78%{transform:translateX(4px)} }

    /* popup centré (validation + erreur réseau) */
    .sv-modal { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 20px; opacity: 0; transition: opacity .2s; }
    .sv-modal.in { opacity: 1; }
    .sv-modal__scrim { position: absolute; inset: 0; background: rgba(13,16,25,.52); backdrop-filter: blur(3px); }
    .sv-modal__card { position: relative; width: 100%; max-width: 384px; background: var(--card); border: 1px solid var(--line);
      border-radius: 20px; box-shadow: 0 28px 64px -14px rgba(0,0,0,.45); padding: 32px 26px 26px; text-align: center;
      transform: translateY(10px) scale(.97); transition: transform .22s var(--ease, ease); }
    .sv-modal.in .sv-modal__card { transform: none; }
    .sv-modal__x { position: absolute; top: 12px; right: 13px; width: 34px; height: 34px; border-radius: 10px; border: 0;
      background: transparent; color: var(--ink-3); font-size: 26px; line-height: 1; cursor: pointer; transition: .15s; display: grid; place-items: center; }
    .sv-modal__x:hover { background: var(--paper-2); color: var(--ink); }
    [dir=rtl] .sv-modal__x { right: auto; left: 13px; }
    .sv-modal__ic { width: 58px; height: 58px; border-radius: 50%; display: grid; place-items: center; margin: 0 auto 15px; background: #fef2f2; color: #e11d48; }
    .sv-modal__t { font-family: var(--serif); font-weight: 800; font-size: 21px; margin: 0 0 9px; color: var(--ink); letter-spacing: -.01em; }
    .sv-modal__m { font-size: 14.5px; color: var(--ink-2); line-height: 1.6; margin: 0 0 22px; }
    [dir=rtl] .sv-modal__t, [dir=rtl] .sv-modal__m { font-family: "Cairo", var(--sans); }
    .sv-modal__ok { width: 100%; justify-content: center; padding: 13px; font-size: 15px; border-radius: 12px; }
    .sv-done { display: none; text-align: center; padding: 36px 14px; background: var(--card); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); }
    .sv-done.on { display: block; }
    .sv-done .sv-check { width: 66px; height: 66px; border-radius: 50%; display: grid; place-items: center; margin: 0 auto 18px; background: color-mix(in oklab, #16a34a 12%, var(--card)); color: #16a34a; }
    .sv-done h2 { font-family: var(--serif); font-weight: 800; font-size: 27px; margin: 0 0 10px; }
    [dir=rtl] .sv-done h2, [dir=rtl] .sv-done p { font-family: "Cairo", var(--sans); }
    .sv-done p { color: var(--ink-2); font-size: 16px; margin: 0 auto; max-width: 40ch; line-height: 1.6; }
    .sv-done__go { display: inline-flex; justify-content: center; align-items: center; margin-top: 24px; padding: 13px 24px; font-size: 15px; border-radius: 12px; text-decoration: none; }
    .sv-done__redir { font-size: 12.5px !important; color: var(--ink-3) !important; margin-top: 14px !important; }
  </style>
</head>

    </div>
  </div>

        o("Résultat ?","Pas sûr(e) que ça donne un résultat concret","لست متأكّدًا أنه يعطي نتيجة ملموسة"),
        o("Paiement","Comment payer en ligne (j'ai pas de carte)","كيفية الدفع عبر الإنترنت (ليس لديّ بطاقة)"),
        o("Préfère vidéo","Je préfère les vidéos enregistrées au live","أفضّل الفيديوهات المسجّلة على المباشر"),
        o("Rien (prêt 🔥)","Rien, je suis prêt(e) à m'inscrire 🔥","لا شيء، أنا مستعدّ للتسجيل 🔥") ] },
      { id:"equipement", type:"pills", req:false, L:{fr:"Pour suivre la formation, tu as…", ar:"لمتابعة التكوين، لديك…"}, O:[
        o("PC","Un PC / laptop","حاسوب / لابتوب"),
        o("Smartphone","Seulement un smartphone","هاتف ذكي فقط"),
        o("PC moyen","Un PC mais pas terrible / partagé","حاسوب لكنه ليس جيدًا / مشترك"),
        o("Emprunt/cyber","Je peux en emprunter / aller au cyber","يمكنني استعارته / الذهاب إلى مقهى إنترنت") ] },
      { id:"dispo", type:"pills", req:false, L:{fr:"Quand serais-tu le plus dispo pour une session live ?", ar:"متى تكون متاحًا أكثر لحصة مباشرة ؟"}, O:[
        o("Soir semaine","Soirées en semaine (après 18h)","مساءً في أيام الأسبوع (بعد 18س)"),
        o("Journée semaine","En journée en semaine","نهارًا في أيام الأسبوع"),
        o("Week-end","Le week-end","في عطلة نهاية الأسبوع"),
        o("Vacances","Pendant les vacances","أثناء العطل"),
        o("Flexible","Flexible / peu importe","مرن / لا يهمّ") ] },
      { id:"source", type:"pills", req:false, other:true, L:{fr:"Comment tu as connu WIJHA ?", ar:"كيف تعرّفت على WIJHA ؟"}, O:[
        o("Instagram","Instagram","Instagram"), o("TikTok","TikTok","TikTok"),
        o("Facebook","Facebook (page/pub)","Facebook (صفحة/إعلان)"), o("Groupe FB","Un groupe Facebook","مجموعة على Facebook"),
        o("Ami","Un(e) ami(e)","صديق / أخبرني أحدهم"), o("Google","Google","Google") ] },
      { id:"gouvernorat", type:"select", req:false, L:{fr:"Tu es dans quel gouvernorat ?", ar:"في أي ولاية تقيم ؟"}, H:{fr:"Pour savoir d'où vient notre communauté 🇹🇳", ar:"لكي نعرف من أين يأتي مجتمعنا 🇹🇳"} },
    ];

    var form = document.getElementById("surveyForm");
    var lang = (function () { try { return localStorage.getItem("wijha_survey_lang") === "ar" ? "ar" : "fr"; } catch (e) { return "fr"; } })();
    var values = {}; // id -> canonical value
    var esc = function (s) { return String(s).replace(/[<>&"]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]; }); };

    // drapeaux + noms pour le dropdown langue
    var FLAGS = {
      fr: '<svg class="flag" viewBox="0 0 60 40"><rect width="60" height="40" fill="#fff"/><rect width="20" height="40" fill="#0055A4"/><rect x="40" width="20" height="40" fill="#EF4135"/></svg>',
      ar: '<svg class="flag" viewBox="0 0 60 40"><rect width="60" height="40" fill="#E70013"/><circle cx="30" cy="20" r="11" fill="#fff"/><circle cx="31.4" cy="20" r="8" fill="#E70013"/><circle cx="34.2" cy="20" r="8" fill="#fff"/><path d="M35.5 16.6 36.32 18.87 38.73 18.95 36.83 20.43 37.5 22.75 35.5 21.4 33.5 22.75 34.17 20.43 32.27 18.95 34.68 18.87Z" fill="#E70013"/></svg>'
    };
    var LANGNAME = { fr: "Français", ar: "العربية" };
    var REQ_FIELDS = ["tel", "formation_cible", "intention", "budget"]; // champs obligatoires

    // popup centré réutilisable (validation + erreur réseau) ; onClose appelé sur toute fermeture
    function popup(opts) {
      var prev = document.getElementById("svModal"); if (prev) prev.remove();
      var t = T[lang];
      var m = document.createElement("div"); m.className = "sv-modal"; m.id = "svModal";
      m.innerHTML =
        '<div class="sv-modal__scrim"></div>' +
        '<div class="sv-modal__card" role="dialog" aria-modal="true" aria-live="polite">' +
          '<button class="sv-modal__x" type="button" aria-label="' + esc(t.close) + '">&times;</button>' +
          '<div class="sv-modal__ic"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M12 8v5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><circle cx="12" cy="16.6" r="1.3" fill="currentColor"/><path d="M12 3 22 20H2L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></div>' +
          '<h3 class="sv-modal__t"></h3><p class="sv-modal__m"></p>' +
          '<button class="btn btn--pop sv-modal__ok" type="button"></button>' +
        '</div>';
      m.querySelector(".sv-modal__t").textContent = opts.title;
      m.querySelector(".sv-modal__m").textContent = opts.msg;
      m.querySelector(".sv-modal__ok").textContent = opts.ok || t.okBtn;
      document.body.appendChild(m);
      document.body.style.overflow = "hidden";
      void m.offsetWidth; m.classList.add("in");
      var done = false;
      function close() {
        if (done) return; done = true;
        m.classList.remove("in"); document.body.style.overflow = "";
        document.removeEventListener("keydown", onKey);
        setTimeout(function () { if (m.parentNode) m.remove(); }, 230);
        if (opts.onClose) opts.onClose();
      }
      function onKey(e) { if (e.key === "Escape") close(); }
      m.querySelector(".sv-modal__scrim").addEventListener("click", close);
      m.querySelector(".sv-modal__x").addEventListener("click", close);
      m.querySelector(".sv-modal__ok").addEventListener("click", close);
      document.addEventListener("keydown", onKey);
      m.querySelector(".sv-modal__ok").focus();
    }

    var qEl = function (id) { return form.querySelector('.sv-q[data-q="' + id + '"]'); };
    function markError(id) {
      var q = qEl(id); if (!q) return;
      q.classList.remove("err"); void q.offsetWidth; q.classList.add("err"); // relance l'animation shake
      if (!q.querySelector(".sv-qerr")) { var s = document.createElement("span"); s.className = "sv-qerr"; s.textContent = T[lang].reqMsg; q.appendChild(s); }
    }
    function clearError(id) { var q = qEl(id); if (!q) return; q.classList.remove("err"); var m = q.querySelector(".sv-qerr"); if (m) m.remove(); }

    function build() {
      var t = T[lang];
      document.documentElement.setAttribute("lang", lang === "ar" ? "ar" : "fr");
      document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
      document.getElementById("svTitle").textContent = t.title;
      document.getElementById("svSub").textContent = t.sub;
      document.getElementById("svBadge").textContent = t.badge;
      document.getElementById("svDoneH").textContent = t.doneH;
      document.getElementById("svDoneP").textContent = t.doneP;
      document.getElementById("svDoneGo").textContent = t.doneGo;
      document.getElementById("svDoneRedir").textContent = t.redir;
      document.getElementById("svLangCur").innerHTML = FLAGS[lang] + '<span class="sv-lang__name">' + LANGNAME[lang] + '</span>';
      document.querySelectorAll(".sv-lang__opt").forEach(function (b) { b.classList.toggle("on", b.getAttribute("data-lang") === lang); });

      form.innerHTML = "";
      FIELDS.forEach(function (f) {
        var q = document.createElement("div"); q.className = "sv-q"; q.setAttribute("data-q", f.id);
        var tag = f.req ? '<span class="req"> *</span>' : '<span class="opt"> ' + t.optional + '</span>';
        var label = f.L[lang];
        if (f.type === "tel" || f.type === "text") {
          q.innerHTML = '<label for="f-' + f.id + '">' + label + tag + '</label>' +
            '<input id="f-' + f.id + '" name="' + f.id + '" type="' + f.type + '"' + (f.type === "tel" ? ' inputmode="tel"' : '') +
            ' placeholder="' + esc(f.P[lang]) + '" value="' + esc(values[f.id] || "") + '" />' +
            (f.H ? '<span class="sv-hint">' + f.H[lang] + '</span>' : '');
        } else if (f.type === "select") {
          var opts = GOUV.map(function (g) { return '<option value="' + esc(g) + '"' + ((values[f.id] || "Tunis") === g ? ' selected' : '') + '>' + esc(g) + '</option>'; }).join("");
          if (!values[f.id]) values[f.id] = "Tunis";
          q.innerHTML = '<label for="f-' + f.id + '">' + label + tag + '</label><select id="f-' + f.id + '" name="' + f.id + '">' + opts + '</select>' + (f.H ? '<span class="sv-hint">' + f.H[lang] + '</span>' : '');
        } else { // pills
          var pills = f.O.map(function (op) { return '<button type="button" class="sv-opt' + (values[f.id] === op.v ? " on" : "") + '" data-v="' + esc(op.v) + '">' + esc(op[lang]) + '</button>'; }).join("");
          q.innerHTML = '<span class="sv-label">' + label + tag + '</span>' + (f.H ? '<span class="sv-hint" style="margin:-4px 0 11px">' + f.H[lang] + '</span>' : '') +
            '<div class="sv-opts" data-field="' + f.id + '">' + pills + '</div>' +
            (f.other ? '<input class="sv-other' + (/Autre|أخرى/.test(values[f.id] || "") ? " on" : "") + '" name="' + f.id + '_autre" type="text" placeholder="' + esc(t.other) + '" value="' + esc(values[f.id + "_autre"] || "") + '" />' : '');
        }
        form.appendChild(q);
      });
      var tail = document.createElement("div");
      tail.innerHTML = '<div class="hp" aria-hidden="true"><label>x<input name="company" type="text" tabindex="-1" autocomplete="off" /></label></div>' +
        '<button type="submit" class="btn btn--pop sv-submit" id="svBtn">' + t.submit + '</button>' +
        '<p class="sv-foot">' + t.foot + '</p>';
      form.appendChild(tail);
      wire(); updateProgress();
    }

    function updateProgress() {
      var done = 0; FIELDS.forEach(function (f) { if (values[f.id] && String(values[f.id]).trim()) done++; });
      document.getElementById("svProg").style.width = Math.round(done / FIELDS.length * 100) + "%";
    }
    function wire() {
      form.querySelectorAll(".sv-opts").forEach(function (grp) {
        var field = grp.getAttribute("data-field");
        grp.addEventListener("click", function (e) {
          var b = e.target.closest(".sv-opt"); if (!b) return;
          grp.querySelectorAll(".sv-opt").forEach(function (x) { x.classList.remove("on"); });
          b.classList.add("on");
          values[field] = b.getAttribute("data-v");
          clearError(field);
          var other = form.querySelector('input[name="' + field + '_autre"]');
          if (other) other.classList.toggle("on", /Autre|أخرى/i.test(values[field]) || values[field] === "Autre");
          updateProgress();
        });
      });
      form.querySelectorAll('input[type=text],input[type=tel],select').forEach(function (el) {
        el.addEventListener("input", function () { values[el.name] = el.value; clearError(el.name); updateProgress(); });
        el.addEventListener("change", function () { values[el.name] = el.value; clearError(el.name); updateProgress(); });
      });
    }

    // dropdown langue
    var svLang = document.getElementById("svLang");
    var svLangBtn = document.getElementById("svLangBtn");
    function openLang(on) { svLang.classList.toggle("open", on); svLangBtn.setAttribute("aria-expanded", on ? "true" : "false"); }
    svLangBtn.addEventListener("click", function (e) { e.stopPropagation(); openLang(!svLang.classList.contains("open")); });
    document.getElementById("svLangMenu").addEventListener("click", function (e) {
      var b = e.target.closest(".sv-lang__opt"); if (!b) return;
      lang = b.getAttribute("data-lang");
      try { localStorage.setItem("wijha_survey_lang", lang); } catch (e2) {}
      openLang(false); build();
    });
    document.addEventListener("click", function (e) { if (!svLang.contains(e.target)) openLang(false); });
    document.addEventListener("keydown", function (e) { if (e.key === "Escape") openLang(false); });

    // submit
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var t = T[lang];
      // recolle les valeurs des champs texte/select courants
      form.querySelectorAll('input[type=text],input[type=tel],select').forEach(function (el) { values[el.name] = el.value.trim(); });
      // validation : surligne TOUS les champs requis manquants + scrolle vers le premier
      var missing = REQ_FIELDS.filter(function (id) { return !values[id] || !String(values[id]).trim(); });
      if (missing.length) {
        missing.forEach(markError);
        var firstQ = qEl(missing[0]);
        popup({ title: t.missH, msg: t.missP, onClose: function () {
          if (!firstQ) return;
          firstQ.scrollIntoView({ block: "center", behavior: "smooth" });
          var inp = firstQ.querySelector("input, select"); if (inp) { try { inp.focus({ preventScroll: true }); } catch (e3) {} }
        } });
        return;
      }
      var data = { langue: lang, page: location.pathname, company: (form.querySelector('[name=company]') || {}).value || "" };
      FIELDS.forEach(function (f) { data[f.id] = values[f.id] || ""; if (f.other) data[f.id + "_autre"] = values[f.id + "_autre"] || ""; });
      var btn = document.getElementById("svBtn"); btn.disabled = true; btn.textContent = t.sending; btn.style.opacity = ".7";
      fetch("/api/survey", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) })
        .then(function (r) { if (!r.ok) throw new Error("http " + r.status);
          // succès : on n'affiche QUE le remerciement, puis redirection auto vers le site
          form.style.display = "none";
          document.querySelector(".sv-prog").style.display = "none";
          document.querySelector(".sv-top").style.display = "none";
          document.querySelector(".sv-head").style.display = "none";
          document.getElementById("svDone").classList.add("on");
          window.scrollTo({ top: 0, behavior: "smooth" });
          setTimeout(function () { window.location.href = "/"; }, 4000); })
        .catch(function () { btn.disabled = false; btn.textContent = t.submit; btn.style.opacity = ""; popup({ title: t.errH, msg: t.eNet }); });
    });

    build();
  })();
  </script>
</body>
</html>
